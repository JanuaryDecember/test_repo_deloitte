spring.application.name=deloitter

# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/appdb
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA — Flyway owns the schema, Hibernate only validates
# Using 'none' until JPA entities exist (Phase 3); then switch back to 'validate'
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true

# Docker Compose auto-start disabled — using Podman; start Postgres manually
spring.docker.compose.enabled=false

# Session cookie settings
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.http-only=true
server.servlet.session.timeout=30m
